spring:
  # ── Datasource (conexión a MySQL) ─────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/tienda_ropa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: admin
    password: admin

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # ── SQL Init ─────────────────────────────────────────────────────────────
  sql:
    init:
      mode: never

  # ── DevTools ─────────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true

# ── Servidor embebido (Tomcat) ───────────────────────────────────────────
server:
  port: 8081
  servlet:
    context-path: /

# ── Información de la aplicación ─────────────────────────────────────────
# Laboratorio 2 – Actividad extra: app.version se actualiza en cada deploy
# usando el número de build o commit hash desde GitHub Actions
# (GITHUB_RUN_NUMBER o GITHUB_SHA inyectado como variable de entorno)
app:
  version: ${APP_VERSION:1.0.0-local}   # Si no hay variable de entorno, usa "1.0.0-local"
  name: Tienda Ropa API