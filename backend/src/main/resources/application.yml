spring:
  # ── Datasource (conexión a MySQL / Render variables) ─────────────────────
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tienda_ropa?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  # ── JPA / Hibernate ──────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  # ── SQL Init ─────────────────────────────────────────────────────────────
  sql:
    init:
      mode: never

  # ── DevTools ─────────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true

# ── Servidor embebido (Tomcat) ───────────────────────────────────────────
server:
  port: ${PORT:8081}
  servlet:
    context-path: /

# ── Información de la aplicación ─────────────────────────────────────────
app:
  version: ${APP_VERSION:1.0.0-local}
  name: Tienda Ropa API