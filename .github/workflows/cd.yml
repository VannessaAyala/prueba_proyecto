name: CD – Deploy a Render

on:
  workflow_run:
    workflows: [ "CI – Build & Test" ]
    types:
      - completed
    branches: [ "main" ]

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Info del deploy
        run: |
          APP_VERSION="${{ github.run_number }}-${{ github.event.workflow_run.head_sha }}"
          echo "APP_VERSION=$APP_VERSION"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Trigger Deploy Hook en Render
        run: |
          echo "Enviando deploy a Render..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK }}")

          echo "HTTP Status: $HTTP_CODE"

          # Render puede responder 200, 202 o 204 dependiendo del hook
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Deploy hook falló con HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deploy enviado exitosamente a Render"

      - name: Ejecutar rollback si el deploy fallo
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rollback.yml',
              ref: 'main',
              inputs: {
                motivo: 'Deploy CD fallo automaticamente - rollback activado'
              }
            });