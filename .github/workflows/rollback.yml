# ─────────────────────────────────────────────────────────────────────────────
# ROLLBACK – Reversión automática del último deploy fallido en Render
#
# Actividad extra - Sección de preguntas del Laboratorio 2.
#
# Se puede disparar:
#   a) Manualmente desde GitHub Actions (workflow_dispatch)
#   b) Automáticamente si el CD falla (llamado desde cd.yml)
#
# Secrets requeridos:
#   RENDER_API_KEY   → API Key de tu cuenta Render (Account Settings → API Keys)
#   RENDER_SERVICE_ID → ID del servicio en Render (dashboard → Settings)
# ─────────────────────────────────────────────────────────────────────────────
name: Rollback – Revertir último deploy en Render

on:
  # Permite dispararlo manualmente desde la UI de GitHub Actions
  workflow_dispatch:
    inputs:
      motivo:
        description: 'Motivo del rollback'
        required: false
        default: 'Rollback manual solicitado'

  # También puede ser llamado si el CD falla (ver cd.yml)
  workflow_call:

jobs:
  rollback:
    name: Rollback al último deploy exitoso
    runs-on: ubuntu-latest

    steps:
      - name: Obtener lista de deploys de Render
        id: get_deploys
        run: |
          echo "Consultando deploys del servicio ${{ secrets.RENDER_SERVICE_ID }}..."

          # Obtiene los últimos 10 deploys del servicio
          RESPONSE=$(curl -s --fail \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=10")

          echo "Respuesta de Render API:"
          echo "$RESPONSE" | python3 -m json.tool || echo "$RESPONSE"

          # Extrae el ID del último deploy con status "live" (exitoso)
          LAST_LIVE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          deploys = json.load(sys.stdin)
          live = [d['deploy']['id'] for d in deploys if d['deploy']['status'] == 'live']
          print(live[0] if live else '')
          ")

          echo "Último deploy exitoso encontrado: $LAST_LIVE_ID"
          echo "deploy_id=$LAST_LIVE_ID" >> $GITHUB_OUTPUT

      - name: Verificar que existe un deploy exitoso
        run: |
          if [ -z "${{ steps.get_deploys.outputs.deploy_id }}" ]; then
            echo "❌ No se encontró ningún deploy exitoso para revertir."
            exit 1
          fi
          echo "✅ Deploy a revertir: ${{ steps.get_deploys.outputs.deploy_id }}"

      - name: Ejecutar rollback en Render
        run: |
          echo "Revirtiendo al deploy: ${{ steps.get_deploys.outputs.deploy_id }}"

          curl -s --fail -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys/${{ steps.get_deploys.outputs.deploy_id }}/rollback"

          echo "✅ Rollback ejecutado exitosamente en Render."