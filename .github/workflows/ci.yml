# ─────────────────────────────────────────────────────────────────────────────
# CI – Integración Continua
# Se dispara en cada push o pull_request a la rama main.
# Compila el proyecto con Gradle y ejecuta todos los tests.
# Si falla, el workflow de CD NO se ejecuta.
# ─────────────────────────────────────────────────────────────────────────────
name: CI – Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga el código del repositorio
      - name: Checkout código fuente
        uses: actions/checkout@v4

      # 2. Configura el JDK 17 (igual que en IntelliJ)
      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Cache de dependencias Gradle para acelerar builds futuros
      - name: Cache de dependencias Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Da permisos de ejecución al wrapper de Gradle
      - name: Dar permisos a gradlew
        run: chmod +x backend/gradlew

      # 5. Compila el proyecto y ejecuta los tests
      - name: Build y tests
        run: ./gradlew clean build
        working-directory: backend

      # 6. (Opcional) Publica el reporte de tests como artefacto descargable
      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/